# The Record — your own Nostr relay (nostr-rs-relay).
# Lightweight (Rust, LMDB-free SQLite), runs on a ~$5 VPS or a Raspberry Pi.
#   docker compose up -d
# Local test: connect a client to ws://localhost:8080
# Production: keep it bound to localhost and put Caddy in front for TLS (see Caddyfile).
services:
  relay:
    image: scsibug/nostr-rs-relay:latest
    container_name: the-record-relay
    restart: unless-stopped
    ports:
      # Bound to localhost by DEFAULT so `docker compose up -d` never exposes an
      # unencrypted relay to the internet. Caddy (see Caddyfile) fronts it with TLS.
      # For local-only testing this is all you need. Only widen to "8080:8080"
      # if you deliberately want the raw ws:// port reachable from the network.
      - "127.0.0.1:8080:8080"
    volumes:
      - ./config.toml:/usr/src/app/config.toml:ro
      - relay-data:/usr/src/app/db
    user: "1000:1000"
volumes:
  relay-data:
